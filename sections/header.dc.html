<x-dc>
  <!-- ░░ HEADER ░░ -->
  <header style="position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.97); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);">
    <div class="le-header-bar">
      <img class="le-logo" src="Files from Michelle/Linen Exchange Logo  (1).png" alt="Linen Exchange">
      <nav class="le-nav--desktop">
        <a href="#services" class="le-nav-link">Services</a>
        <a href="#sectors" class="le-nav-link">Sectors</a>
        <a href="#why-us" class="le-nav-link">Why Us</a>
        <a href="#how-it-works" class="le-nav-link">How It Works</a>
        <a href="#products" class="le-nav-link">Products</a>
      </nav>
      <div class="le-header-actions">
        <button class="le-menu-btn" onClick="{{ toggleMenu }}" aria-label="Open menu" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path></svg>
        </button>
        <a class="le-call-btn" href="tel:0452674784">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.63 4.35 2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.13 6.13l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          <span class="le-call-text--long">Call: 0452 674 784</span>
          <span class="le-call-text--short">Call</span>
        </a>
      </div>
    </div>
    <sc-if value="{{ menuOpen }}">
      <nav class="le-nav--mobile">
        <a href="#services" class="le-nav-link">Services</a>
        <a href="#sectors" class="le-nav-link">Sectors</a>
        <a href="#why-us" class="le-nav-link">Why Us</a>
        <a href="#how-it-works" class="le-nav-link">How It Works</a>
        <a href="#products" class="le-nav-link">Products</a>
      </nav>
    </sc-if>
  </header>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    this._onCloseMenu = () => this.setState({ menuOpen: false });
    document.addEventListener('le:close-menu', this._onCloseMenu);
  }
  componentWillUnmount() {
    document.removeEventListener('le:close-menu', this._onCloseMenu);
  }
  renderVals() {
    return {
      menuOpen: !!this.state.menuOpen,
      toggleMenu: () => this.setState({ menuOpen: !this.state.menuOpen })
    };
  }
}
</script>
