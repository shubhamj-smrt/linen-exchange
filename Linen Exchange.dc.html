<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f7f5;
      --card: #ffffff;
      --border: #e4e6ea;
      --primary: #1e3a4c;
      --accent: #c4a878;
      --fg: #111827;
      --muted-fg: #6b7280;
      --subtle-fg: #4b5563;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.6;
    }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; }
    html {
      scroll-behavior: smooth;
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }
    html, body { overflow-x: hidden; max-width: 100%; }
    /* dc-runtime sets height:100% on html/body/#dc-root which traps content and breaks scroll */
    html, body, #dc-root, #dc-root > .sc-host {
      height: auto !important;
      min-height: 100%;
    }
    section[id] { scroll-margin-top: 0; }
    @media (max-width: 768px) {
      section[id] { scroll-margin-top: 56px; }
    }

    .le-section { padding: 5rem 1.5rem; }
    .le-section--hero { padding: 6rem 1.5rem; }
    .le-section--cta { padding: 5rem 1.5rem; }
    .le-section--footer { padding: 3.5rem 1.5rem 2.5rem; }
    .le-container { max-width: 1200px; margin: 0 auto; width: 100%; }
    .le-grid { display: grid; gap: 1.5rem; }

    .le-header-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      width: 100%;
    }
    .le-logo { height: 40px; width: auto; flex-shrink: 0; }
    .le-nav--desktop {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
      justify-content: center;
      min-width: 0;
    }
    .le-nav-link {
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted-fg);
      padding: 6px 11px;
      border-radius: 6px;
      transition: background 0.2s ease, color 0.2s ease;
      white-space: nowrap;
      letter-spacing: -0.01em;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }
    .le-nav--desktop .le-nav-link:hover {
      background: #f0ede8;
      color: var(--primary);
    }
    .le-header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .le-menu-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }
    .le-nav--mobile {
      display: none;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.75rem 1.5rem 1rem;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.99);
    }
    .le-nav--mobile button,
    .le-nav--mobile a,
    .le-nav--mobile .le-nav-link {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--muted-fg);
      padding: 0.75rem 0.5rem;
      border-radius: 8px;
      transition: background 0.2s ease, color 0.2s ease;
      text-decoration: none;
      display: block;
    }
    .le-nav--mobile button:hover,
    .le-nav--mobile a:hover,
    .le-nav--mobile .le-nav-link:hover {
      background: #f0ede8;
      color: var(--primary);
    }
    .le-call-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: white;
      padding: 0 18px;
      height: 38px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: background-color 0.3s ease, color 0.3s ease;
      white-space: nowrap;
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }
    .le-call-btn:hover {
      background-color: var(--accent);
      color: var(--primary);
    }
    .le-call-btn--wide {
      padding: 0 2.25rem;
      height: 54px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      max-width: 100%;
    }
    .le-hero-badge {
      max-width: 100%;
      flex-wrap: wrap;
      justify-content: center;
      text-align: center;
    }
    .le-footer-copy {
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .le-footer-link {
      display: block;
      font-size: 0.875rem;
      color: #b0b8c4;
      text-decoration: none;
      margin-bottom: 0.375rem;
      transition: color 0.2s ease;
    }
    .le-footer-link:hover {
      color: #c4a878;
    }
    .le-footer-tel:hover {
      color: white;
    }
    .le-call-text--short { display: none; }

    @media (max-width: 768px) {
      .le-nav--desktop { display: none !important; }
      .le-menu-btn { display: inline-flex; }
      .le-nav--mobile { display: flex; }
      .le-call-text--long { display: none; }
      .le-call-text--short { display: inline; }
      .le-header-bar { padding: 0 1rem; height: 56px; }
      .le-logo { height: 34px; }
      .le-call-btn { padding: 0 12px; height: 36px; font-size: 0.8125rem; }
    }

    @media (min-width: 769px) {
      .le-call-text--short { display: none; }
      .le-nav--mobile { display: none !important; }
    }

    @media (max-width: 640px) {
      .le-section { padding: 3.5rem 1rem !important; }
      .le-section--hero { padding: 4rem 1rem !important; }
      .le-section--cta { padding: 3.5rem 1rem !important; }
      .le-section--footer { padding: 2.5rem 1rem 2rem !important; }
      .le-grid { grid-template-columns: 1fr !important; }
      .le-call-btn--wide {
        width: 100%;
        justify-content: center;
        padding: 0 1.25rem !important;
        height: 50px !important;
        font-size: 0.9375rem !important;
      }
      .le-call-btn--wide .le-call-text--long { display: none; }
      .le-call-btn--wide .le-call-text--short { display: inline; }
    }

    @media (max-width: 360px) {
      .le-section { padding: 3rem 0.875rem !important; }
      .le-section--hero { padding: 3.5rem 0.875rem !important; }
      .le-header-bar { padding: 0 0.75rem; gap: 0.5rem; }
      .le-nav--mobile { padding: 0.75rem 0.875rem 1rem; }
      .le-call-btn { padding: 0 10px; gap: 5px; }
      .le-logo { height: 30px; }
    }
  </style>
</helmet>

<div style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;">

  <dc-import name="sections/header" />
  <dc-import name="sections/hero" />
  <dc-import name="sections/services" />
  <dc-import name="sections/sectors" hide-img="{{ hideImg }}" />
  <dc-import name="sections/why-us" />
  <dc-import name="sections/how-it-works" />
  <dc-import name="sections/products" />
  <dc-import name="sections/cta" />
  <dc-import name="sections/footer" />

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      hideImg: (e) => { e.target.style.display = 'none'; }
    };
  }
}
</script>
<script>
(function () {
  document.addEventListener('click', (e) => {
    const link = e.target.closest('a[href^="#"]');
    if (!link) return;
    const hash = link.getAttribute('href');
    if (!hash || hash === '#') return;
    const id = decodeURIComponent(hash.slice(1));
    const el = document.getElementById(id);
    if (!el) return;
    e.preventDefault();
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    const header = document.querySelector('header');
    const offset = isMobile && header ? header.getBoundingClientRect().height : 0;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top, behavior: 'smooth' });
    history.replaceState(null, '', hash);
    document.dispatchEvent(new CustomEvent('le:close-menu'));
  });
})();
</script>
</body>
</html>
